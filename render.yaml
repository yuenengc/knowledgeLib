services:
  - type: web
    name: knowledge-lib-backend
    env: docker
    plan: starter
    dockerContext: .
    envVars:
      - key: PORT
        value: 10000
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_API_BASE
        value: https://api.deepseek.com/v1
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: HF_EMBED_MODEL
        value: BAAI/bge-small-zh-v1.5
      - key: DATA_DIR
        value: /var/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: CHROMA_DIR
        value: /var/data/chroma
    disk:
      name: knowledge-lib-data
      mountPath: /var/data
      sizeGB: 10
